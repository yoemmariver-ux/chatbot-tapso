<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Chatbot Tapso</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f4f4;
      margin: 0;
      padding: 20px;
    }
    #chat {
      background: #fff;
      border: 1px solid #ccc;
      padding: 10px;
      height: 300px;
      overflow-y: auto;
      margin-bottom: 10px;
    }
    .user-msg {
      text-align: right;
      color: #fff;
      background: #007bff;
      padding: 5px 10px;
      border-radius: 10px;
      margin: 5px 0;
      display: inline-block;
    }
    .bot-msg {
      text-align: left;
      color: #000;
      background: #e0e0e0;
      padding: 5px 10px;
      border-radius: 10px;
      margin: 5px 0;
      display: inline-block;
    }
    #entrada {
      width: 70%;
      padding: 8px;
    }
    button {
      padding: 8px 15px;
      background: #007bff;
      color: #fff;
      border: none;
      cursor: pointer;
      border-radius: 5px;
    }
    button:hover {
      background: #0056b3;
    }
  </style>
</head>
<body>
  <h1>Chatbot Tapso</h1>
  <div id="chat"></div>

  <input type="text" id="entrada" placeholder="Escribe tu mensaje...">
  <button onclick="enviarMensaje()">Enviar</button>

  <script src="script.js"></script>
</body>
</html>
